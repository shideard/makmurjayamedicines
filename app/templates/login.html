{% extends "base.html" %}

{% block title %}Masuk - Klinik Makmur Jaya{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-md border border-k24-border">
        <div class="text-center mb-8">
            <i data-lucide="cross" class="text-k24-primary w-12 h-12 mx-auto mb-4"></i>
            <h2 class="text-3xl font-extrabold text-k24-textPrimary">Masuk ke Akun Anda</h2>
            <p class="mt-2 text-sm text-k24-textSecondary">
                Atau <a href="/register" class="font-medium text-k24-primary hover:text-green-700">daftar akun baru</a>
            </p>
        </div>
        
        <form class="space-y-6" action="/api/v1/auth/login-web" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label for="email" class="block text-sm font-medium text-k24-textPrimary mb-1">Email address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none z-10">
                        <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-3 py-2 pl-10 border border-k24-border rounded-md placeholder-gray-500 text-gray-900 bg-transparent focus:bg-white focus:outline-none focus:ring-k24-primary focus:border-k24-primary sm:text-sm transition-colors" placeholder="nama@email.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-k24-textPrimary mb-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none z-10">
                        <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-3 py-2 pl-10 border border-k24-border rounded-md placeholder-gray-500 text-gray-900 bg-transparent focus:bg-white focus:outline-none focus:ring-k24-primary focus:border-k24-primary sm:text-sm transition-colors" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-k24-primary focus:ring-k24-primary border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-k24-textPrimary">Ingat saya</label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-k24-primary hover:text-green-700">Lupa password?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-bold rounded-md text-white bg-k24-primary hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-k24-primary transition-colors">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i data-lucide="log-in" class="h-5 w-5 text-green-300 group-hover:text-green-200"></i>
                    </span>
                    Masuk
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
