{% extends "base.html" %}

{% block title %}Unggah Resep - Klinik Makmur Jaya{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-k24-border overflow-hidden mt-8">
    <div class="p-6 border-b border-k24-border">
        <h1 class="text-2xl font-bold text-k24-textPrimary">Unggah Resep Dokter</h1>
        <p class="text-sm text-k24-textSecondary mt-1">Tim Apoteker kami akan memverifikasi resep Anda sebelum memproses pesanan.</p>
    </div>
    
    <div class="p-6">
        <form action="/unggah-resep" method="POST" enctype="multipart/form-data" class="space-y-6">
            <div>
                <label for="doctor_name" class="block text-sm font-medium text-k24-textPrimary mb-2">Nama Dokter</label>
                <input type="text" id="doctor_name" name="doctor_name" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary"
                    placeholder="Contoh: dr. Budi Santoso, Sp.PD">
            </div>
            
            <div>
                <label for="file" class="block text-sm font-medium text-k24-textPrimary mb-2">Foto / Scan Resep</label>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-k24-primary transition-colors cursor-pointer" onclick="document.getElementById('file').click()">
                    <div class="space-y-1 text-center">
                        <i data-lucide="upload-cloud" class="mx-auto h-12 w-12 text-gray-400"></i>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <label for="file" class="relative cursor-pointer bg-white rounded-md font-medium text-k24-primary hover:text-green-700 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-k24-primary">
                                <span>Pilih file</span>
                                <input id="file" name="file" type="file" class="sr-only" required accept="image/jpeg, image/png, application/pdf">
                            </label>
                            <p class="pl-1">atau tarik dan lepas di sini</p>
                        </div>
                        <p class="text-xs text-gray-500">PNG, JPG, PDF (Maks. 5MB)</p>
                    </div>
                </div>
                <p id="file-name" class="text-sm text-center text-k24-textPrimary mt-2 font-medium"></p>
            </div>

            <div>
                <label for="notes" class="block text-sm font-medium text-k24-textPrimary mb-2">Catatan Tambahan (Opsional)</label>
                <textarea id="notes" name="notes" rows="3"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary"
                    placeholder="Apakah ada instruksi khusus untuk Apoteker?"></textarea>
            </div>
            
            <div class="flex justify-end gap-4 pt-4 border-t border-gray-100">
                <a href="/pelanggan/dashboard" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">Batal</a>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-k24-primary rounded-md hover:bg-green-700">Unggah Sekarang</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('file').addEventListener('change', function(e) {
        var fileName = e.target.files[0] ? e.target.files[0].name : '';
        document.getElementById('file-name').textContent = fileName;
    });
</script>
{% endblock %}
