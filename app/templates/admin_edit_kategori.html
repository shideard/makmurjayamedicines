{% extends "base.html" %}
{% block title %}Edit Kategori - Admin Makmur Jaya{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="/admin/kategori" class="text-k24-textSecondary hover:text-k24-primary flex items-center transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Kembali ke Daftar Kategori
    </a>
</div>
<div class="bg-white rounded-xl shadow-sm border border-k24-border overflow-hidden max-w-xl">
    <div class="p-6 border-b border-k24-border bg-gray-50">
        <h1 class="text-xl font-bold text-k24-textPrimary">Edit Kategori: {{ category.name }}</h1>
    </div>
    <form action="/admin/edit-kategori/{{ category.id }}" method="POST" class="p-8 space-y-5">
        <div>
            <label class="block text-sm font-medium text-k24-textPrimary mb-1">Nama Kategori <span class="text-red-500">*</span></label>
            <input type="text" name="name" value="{{ category.name }}" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary">
        </div>
        <div>
            <label class="block text-sm font-medium text-k24-textPrimary mb-1">Deskripsi</label>
            <textarea name="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary resize-none">{{ category.description or '' }}</textarea>
        </div>
        <div class="flex gap-4 pt-2 border-t border-k24-border">
            <button type="submit" class="bg-k24-primary text-white font-bold py-2 px-8 rounded-md hover:bg-green-700 transition-colors shadow-sm">Simpan</button>
            <a href="/admin/kategori" class="text-k24-textSecondary hover:text-k24-primary font-medium py-2 px-4">Batal</a>
        </div>
    </form>
</div>
{% endblock %}
