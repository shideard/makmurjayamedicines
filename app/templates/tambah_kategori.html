{% extends "base.html" %}

{% block title %}Tambah Kategori Obat - Klinik Makmur Jaya{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-k24-border overflow-hidden mt-8">
    <div class="p-6 border-b border-k24-border flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-k24-textPrimary">Tambah Kategori Baru</h1>
            <p class="text-sm text-k24-textSecondary mt-1">Buat pengelompokan baru untuk katalog obat.</p>
        </div>
        <a href="/admin/tambah-obat" class="text-gray-500 hover:text-gray-700 flex items-center gap-1 text-sm font-medium">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
        </a>
    </div>
    
    <div class="p-6">
        <form action="/admin/tambah-kategori" method="POST" class="space-y-6">
            <div>
                <label for="name" class="block text-sm font-medium text-k24-textPrimary mb-2">Nama Kategori</label>
                <input type="text" id="name" name="name" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary"
                    placeholder="Contoh: Obat Resep, Obat Bebas, Vitamin">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-k24-textPrimary mb-2">Deskripsi Singkat (Opsional)</label>
                <textarea id="description" name="description" rows="3"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-k24-primary focus:border-k24-primary"
                    placeholder="Contoh: Obat-obatan yang harus menggunakan resep dokter..."></textarea>
            </div>
            
            <div class="flex justify-end gap-4 pt-4 border-t border-gray-100">
                <a href="/admin/dashboard" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors">Batal</a>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-k24-primary rounded-md hover:bg-green-700 transition-colors shadow-sm flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Simpan Kategori
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
